version: 2

builds:
  - id: tsentry
    main: ./cmd/tsentry
    binary: tsentry
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: tsentry
    name_template: "tsentry_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt
  algorithm: sha256

release:
  github:
    owner: jsabo
    name: tsentry
  draft: false
  prerelease: auto
  name_template: "tsentry {{.Tag}}"

brews:
  - name: tsentry
    repository:
      owner: jsabo
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    commit_author:
      name: Jonathan Sabo
      email: jonathan@sabo.io
    homepage: "https://github.com/jsabo/tsentry"
    description: "Watches Teleport AI session summaries and locks high-risk users"
    license: "Apache-2.0"
    install: |
      bin.install "tsentry"
    test: |
      system "#{bin}/tsentry", "--version"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch
