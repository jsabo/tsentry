# Labels synced to GitHub via .github/workflows/labels.yml
# Edit here and push to main — the workflow keeps the repo in sync.

- name: bug
  color: 'd73a4a'
  description: Something isn't working

- name: enhancement
  color: 'a2eeef'
  description: New feature or request

- name: documentation
  color: '0075ca'
  description: Improvements or additions to documentation

- name: question
  color: 'd876e3'
  description: Further information is requested

- name: good first issue
  color: '7057ff'
  description: Good for newcomers

- name: help wanted
  color: '008672'
  description: Extra attention is needed

- name: breaking change
  color: 'e4e669'
  description: Introduces a breaking change

- name: dependencies
  color: '0366d6'
  description: Dependency updates

- name: security
  color: 'ee0701'
  description: Security-related fix or concern

- name: teleport
  color: '512bd4'
  description: Teleport API or cluster behavior

- name: wontfix
  color: 'ffffff'
  description: This will not be worked on
